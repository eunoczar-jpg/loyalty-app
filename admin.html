<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    input { padding: 8px; width: 300px; margin-right: 8px; }
    button { padding: 8px 16px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f4f4f4; }
    tr:hover { background: #f9f9f9; }
    #login-section input { display: block; margin-bottom: 10px; width: 300px; }
    .visits { font-weight: bold; }
  </style>
</head>
<body>

  <div id="login-section">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <div id="admin-panel" style="display:none">
    <h2>Admin Panel</h2>
    <button onclick="logout()" style="float:right">Logout</button>
    <input type="text" id="search" placeholder="Search by email..." oninput="filterCustomers()" />
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Visits</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="customer-list">
        <tr><td colspan="3">Loading customers...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const ADMIN_EMAIL = bigbraincafe22@gmail.com;

    const supabase = window.supabase.createClient(
      'https://gnhnakfppfjhccousgds.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduaG5ha2ZwcGZqaGNjb3VzZ2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjQwMDgsImV4cCI6MjA5NzAwMDAwOH0.-tkClG-l39YX7ATxdpfPHo5VF9aZAXQPU37FA_q7S0Y'
    );

    let allCustomers = [];

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert('Error: ' + error.message);
    }

    async function logout() {
      await supabase.auth.signOut();
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('admin-panel').style.display = 'none';
    }

    async function loadCustomers() {
      const { data } = await supabase.from('customers').select('*');
      allCustomers = data || [];
      renderCustomers(allCustomers);
    }

    function renderCustomers(customers) {
      const list = document.getElementById('customer-list');
      if (customers.length === 0) {
        list.innerHTML = '<tr><td colspan="3">No customers found</td></tr>';
        return;
      }
      list.innerHTML = customers.map(c => `
        <tr>
          <td>${c.email}</td>
          <td class="visits">${c.visits}</td>
          <td><button onclick="logVisit('${c.email}')">Log a Visit</button></td>
        </tr>
      `).join('');
    }

    function filterCustomers() {
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = allCustomers.filter(c => c.email.toLowerCase().includes(search));
      renderCustomers(filtered);
    }

    async function logVisit(email) {
      const { data: customer } = await supabase
        .from('customers')
        .select('visits')
        .eq('email', email)
        .single();

      await supabase.from('customers')
        .update({ visits: customer.visits + 1 })
        .eq('email', email);

      alert('Visit logged! ✅');
      loadCustomers();
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session && session.user.email === ADMIN_EMAIL) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        loadCustomers();
      } else if (session && session.user.email !== ADMIN_EMAIL) {
        alert('You are not authorised to view this page!');
        await supabase.auth.signOut();
      } else {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'none';
      }
    });
  </script>

</body>
</html>
