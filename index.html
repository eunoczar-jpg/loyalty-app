<!DOCTYPE html>
<html>
<head>
  <title>My Loyalty App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    input {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #45a049; }
    #dashboard { text-align: center; }

    #visit-count {
      font-size: 48px;
      font-weight: bold;
      display: block;
      margin: 20px 0;
    }

    #total-visits {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }

    .reward-item {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
    }

    .reward-item:hover { background: #fff3cd; }

    .claimed-item {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      text-align: left;
      color: #999;
    }

    .tier-item {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      text-align: left;
    }

    .rewards-section {
      margin-top: 20px;
      text-align: left;
    }

    .rewards-section h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }

    #claim-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    #claim-modal.show { display: flex; }

    #claim-box {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }

    #claim-box h2 { margin-bottom: 10px; }
    #claim-box p { color: #666; margin-bottom: 20px; }
    #claim-btn { background: #4CAF50; }
    #back-btn { background: #999; }

    #loading {
      text-align: center;
      margin-top: 40px;
      color: #999;
    }

    .forgot-password {
      background: none;
      color: #4CAF50;
      border: none;
      padding: 0;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      width: auto;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>Loyalty Card</h1>

  <p id="loading">Loading...</p>

  <div id="login-section" style="display:none">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="login-btn">Login</button>
    <button id="signup-btn">Sign Up</button>
    <button class="forgot-password" id="forgot-btn">Forgot password?</button>
  </div>

  <div id="dashboard" style="display:none">
    <p>Welcome! 👋</p>
    <p>Visits this cycle: <span id="visit-count">0</span></p>
    <p id="total-visits">Total visits: 0</p>
    <input type="text" id="code-input" placeholder="Enter your code here..." style="text-transform:uppercase" />
    <button id="redeem-btn">Redeem Code</button>
    <button id="logout-btn" style="background:#e53935">Logout</button>

    <div class="rewards-section">
      <h3>🏆 What you can earn</h3>
      <div id="tiers-list">Loading...</div>
    </div>

    <div class="rewards-section">
      <h3>🎁 Your Rewards</h3>
      <div id="rewards-list">No rewards yet!</div>
    </div>

    <div class="rewards-section">
      <h3>✅ Claimed Rewards</h3>
      <div id="claimed-list">No claimed rewards yet!</div>
    </div>
  </div>

  <div id="claim-modal">
    <div id="claim-box">
      <h2 id="claim-title">🎁 Reward!</h2>
      <p id="claim-earned-date"></p>
      <p>Show this screen to claim your reward!</p>
      <button id="claim-btn">Claim Reward</button>
      <button id="back-btn">Go Back</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gnhnakfppfjhccousgds.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduaG5ha2ZwcGZqaGNjb3VzZ2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjQwMDgsImV4cCI6MjA5NzAwMDAwOH0.-tkClG-l39YX7ATxdpfPHo5VF9aZAXQPU37FA_q7S0Y';

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedRewardId = null;
    let selectedRewardName = null;
    let currentUser = null;

    async function init() {
      const { data: { session } } = await client.auth.getSession();
      document.getElementById('loading').style.display = 'none';
      if (session) {
        currentUser = session.user;
        showDashboard();
      } else {
        showLogin();
      }
    }

    function showDashboard() {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadCustomer(currentUser.email);
      loadRewards(currentUser.email);
      loadTiers();
    }

    function showLogin() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('login-btn').addEventListener('click', login);
      document.getElementById('signup-btn').addEventListener('click', signup);
      document.getElementById('redeem-btn').addEventListener('click', redeemCode);
      document.getElementById('logout-btn').addEventListener('click', logout);
      document.getElementById('claim-btn').addEventListener('click', claimReward);
      document.getElementById('back-btn').addEventListener('click', closeModal);
      document.getElementById('forgot-btn').addEventListener('click', forgotPassword);
      init();
    });

    async function signup() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await client.auth.signUp({ email, password });
      if (error) alert('Error: ' + error.message);
      else alert('Account created! 👍');
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) { alert('Error: ' + error.message); return; }
      currentUser = data.user;
      showDashboard();
    }

    async function logout() {
      await client.auth.signOut();
      currentUser = null;
      showLogin();
    }

    async function forgotPassword() {
      const email = document.getElementById('email').value;
      if (!email) { alert('Please enter your email first!'); return; }
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://eunoczar-jpg.github.io/loyalty-app/'
      });
      if (error) alert('Error: ' + error.message);
      else alert('Password reset email sent! Check your inbox 📧');
    }

    async function loadCustomer(email) {
      const { data, error } = await client
        .from('customers')
        .select('visits, total_visits')
        .eq('email', email)
        .single();

      if (error || !data) {
        await client.from('customers').insert({ email, visits: 0, total_visits: 0 });
        document.getElementById('visit-count').textContent = 0;
        document.getElementById('total-visits').textContent = 'Total visits: 0';
      } else {
        document.getElementById('visit-count').textContent = data.visits;
        document.getElementById('total-visits').textContent = 'Total visits: ' + (data.total_visits || 0);
      }
    }

    async function loadTiers() {
      const { data } = await client
        .from('reward_tiers')
        .select('*')
        .order('visits_required', { ascending: true });

      if (!data || data.length === 0) {
        document.getElementById('tiers-list').innerHTML = 'No rewards set up yet!';
        return;
      }

      document.getElementById('tiers-list').innerHTML = data.map(t => `
        <div class="tier-item">
          ${t.emoji} ${t.description}<br>
          <small>Every ${t.visits_required} visits</small>
        </div>
      `).join('');
    }

    async function loadRewards(email) {
      const { data } = await client
        .from('rewards')
        .select('*')
        .eq('email', email)
        .order('earned_at', { ascending: true });

      if (!data || data.length === 0) {
        document.getElementById('rewards-list').innerHTML = 'No rewards yet!';
        document.getElementById('claimed-list').innerHTML = 'No claimed rewards yet!';
        return;
      }

      const unclaimed = data.filter(r => !r.claimed);
      const claimed = data.filter(r => r.claimed);

      document.getElementById('rewards-list').innerHTML = unclaimed.length === 0
        ? 'No rewards yet!'
        : unclaimed.map(r => `
            <div class="reward-item" onclick="openModal('${r.id}', '${r.earned_at}', '${r.description}')">
              ${r.emoji || '🎁'} ${r.description || 'Reward'}<br>
              <small>Earned ${formatDate(r.earned_at)}</small>
            </div>
          `).join('');

      document.getElementById('claimed-list').innerHTML = claimed.length === 0
        ? 'No claimed rewards yet!'
        : claimed.map(r => `
            <div class="claimed-item">
              ${r.emoji || '🎁'} ${r.description || 'Reward'}<br>
              <small>Earned ${formatDate(r.earned_at)} · Claimed ${formatDate(r.claimed_at)}</small>
            </div>
          `).join('');
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    function openModal(rewardId, earnedAt, description) {
      selectedRewardId = rewardId;
      selectedRewardName = description;
      document.getElementById('claim-title').textContent = '🎁 ' + description;
      document.getElementById('claim-earned-date').textContent = 'Earned ' + formatDate(earnedAt);
      document.getElementById('claim-modal').classList.add('show');
    }

    function closeModal() {
      selectedRewardId = null;
      document.getElementById('claim-modal').classList.remove('show');
    }

    async function claimReward() {
      if (!selectedRewardId) return;
      await client.from('rewards').update({
        claimed: true,
        claimed_at: new Date().toISOString()
      }).eq('id', selectedRewardId);
      closeModal();
      loadRewards(currentUser.email);
    }

    async function redeemCode() {
      const userCode = document.getElementById('code-input').value.toUpperCase().trim();
      if (!userCode) { alert('Please enter a code!'); return; }

      const { data: codeData } = await client
        .from('codes')
        .select('*')
        .eq('id', userCode)
        .single();

      if (!codeData) { alert('❌ Invalid code!'); return; }
      if (codeData.used) { alert('❌ This code has already been used!'); return; }

      const createdAt = new Date(codeData.created_at);
      const now = new Date();
      const diffMinutes = (now - createdAt) / 1000 / 60;
      if (diffMinutes > 5) {
        alert('❌ This code has expired! Please get a new one.');
        return;
      }

      await client.from('codes').update({
        used: true,
        used_by: currentUser.email,
        used_at: new Date().toISOString()
      }).eq('id', userCode);

      const { data: customer } = await client
        .from('customers')
        .select('*')
        .eq('email', currentUser.email)
        .single();

      let newVisits = 1;
      let newTotalVisits = 1;

      if (customer) {
        newTotalVisits = (customer.total_visits || 0) + 1;
        // reset main counter at 26
        newVisits = customer.visits >= 26 ? 1 : customer.visits + 1;
        await client.from('customers')
          .update({ visits: newVisits, total_visits: newTotalVisits })
          .eq('email', currentUser.email);
      } else {
        await client.from('customers')
          .insert({ email: currentUser.email, visits: 1, total_visits: 1 });
      }

      // check reward tiers
      const { data: tiers } = await client
        .from('reward_tiers')
        .select('*');

      if (tiers) {
        for (const tier of tiers) {
          if (newVisits % tier.visits_required === 0) {
            await client.from('rewards').insert({
              email: currentUser.email,
              earned_at: new Date().toISOString(),
              claimed: false,
              description: tier.description,
              emoji: tier.emoji
            });
            alert(`✅ Visit logged! AND you earned: ${tier.emoji} ${tier.description}!`);
          }
        }
      }

      if (!tiers || !tiers.some(t => newVisits % t.visits_required === 0)) {
        alert('✅ Visit logged! Thanks for coming in!');
      }

      await client.from('archive').insert({
        email: currentUser.email,
        code: userCode,
        visited_at: new Date().toISOString()
      });

      document.getElementById('code-input').value = '';
      loadCustomer(currentUser.email);
      loadRewards(currentUser.email);
    }
  </script>

</body>
</html>
